name: Build CSharp EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet Packages
      run: nuget restore WowFishing.sln

    - name: Build Solution
      run: msbuild WowFishing.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WowFishing-Windows-EXE
        # 这里会自动抓取生成的 bin 文件夹下所有的 .exe 文件
        path: "**/bin/Release/**/*.exe"
