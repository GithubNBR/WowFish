name: Build Portable WowFishing 2026

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Publish All-in-One Package
      # 参数解释：
      # -r win-x64: 锁定 Windows 64位系统
      # --self-contained true: 把 .NET 运行库直接塞进去，你不用再安装任何环境
      # -p:PublishSingleFile=false: 不合并成一个巨大的 exe，避免被杀毒软件当病毒
      run: |
        dotnet publish WowFishing.sln -c Release -r win-x64 --self-contained true -o ./Final_Output

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WowFishing_No_Install_Required
        path: ./Final_Output/
