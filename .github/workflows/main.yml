name: Build EXE Ultimate

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Tools
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller wheel

    - name: Install Requirements
      run: |
        # 如果有 requirements.txt 就安装，没有就跳过
        if (Test-Path "requirements.txt") { pip install -r requirements.txt }

    - name: Auto-Detect and Build
      shell: pwsh
      run: |
        # 寻找最像启动文件的脚本
        $target = ""
        if (Test-Path "main.py") { $target = "main.py" }
        elseif (Test-Path "wowfish.py") { $target = "wowfish.py" }
        elseif (Test-Path "gui.py") { $target = "gui.py" }
        else { $target = (Get-ChildItem *.py | Select-Object -First 1).Name }

        if (-not $target) { Write-Error "找不到任何 Python 脚本！"; exit 1 }
        
        Write-Host "正在打包文件: $target"
        pyinstaller --onefile --noconsole --name "WowFish_Tool" $target

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WowFish-Windows-EXE
        path: dist/WowFish_Tool.exe
