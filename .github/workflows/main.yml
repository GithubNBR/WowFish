name: Build CSharp Full Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet Packages
      run: nuget restore WowFishing.sln

    - name: Build Solution
      run: msbuild WowFishing.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Prepare Package
      shell: pwsh
      run: |
        # 创建一个专门的存放目录
        New-Item -ItemType Directory -Path "Final_Release"
        # 把所有生成的 exe, dll 和配置文件都抓过来
        Get-ChildItem -Recurse -Path "**/bin/Release/" -Include *.exe, *.dll, *.config, *.xml | Copy-Item -Destination "Final_Release" -Force
        Write-Host "打包完成，准备上传..."

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WowFishing_Full_Package
        path: Final_Release/
